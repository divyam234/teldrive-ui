# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Publish App

on:

  workflow_dispatch:
      inputs:
        API_URL:
          description: 'API URL'     
          required: true
          default: 'https://drive-api2.redux.workers.dev/api'
          
        WORKER_NAME:
          description: 'WORKER NAME'     
          required: true
          default: 'gdrive2'
          
        AUTH:
          description: 'AUTH'     
          required: true
          default: 'true'

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [17.x]
    steps:
    - uses: actions/checkout@v3
      with:
        clean: false
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ matrix.node-version }}
 #       cache: 'npm' <--- Action works only if cache disabled.
    - run: |
          npm install
          curl -LO "https://github.com/divyam234/Chonky/releases/download/v2.3.4/chonky.zip"
          sudo rm -r ./node_modules/chonky/dist/
          mkdir -p ./node_modules/chonky/dist/
          unzip chonky.zip -d ./node_modules/chonky/dist/
          npm run build
          
    - name: Publish app
      uses: cloudflare/wrangler-action@1.3.0
      with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          preCommands: sed -i "s/#WORKERNAME/$WORKERNAME/g" ./wrangler.toml
          secrets: |
            USER
            PASS
            AUTH
            
    env:
        USER: ${{ secrets.USER }}
        PASS: ${{ secrets.PASS }}
        AUTH:  ${{ github.event.inputs.AUTH }}
        REACT_APP_API_URL : ${{ github.event.inputs.API_URL }}
        WORKERNAME : ${{ github.event.inputs.WORKER_NAME }}
        CI: false
